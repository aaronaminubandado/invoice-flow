name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoiceflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Apply migrations
        working-directory: apps/api
        env:
          PGPASSWORD: postgres
        run: |
          for f in migrations/*.sql; do
            psql -h localhost -U postgres -d invoiceflow_test -f "$f"
          done
      - name: Lint backend
        working-directory: apps/api
        run: ruff check app --ignore F401,F841,F811
      - name: Export OpenAPI spec
        working-directory: apps/api
        run: python scripts/export_openapi.py
      - name: Run pytest
        working-directory: apps/api
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/invoiceflow_test
          PYTHONPATH: .
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Lint, test, and build web
        working-directory: apps/web
        run: |
          npm run lint
          npm test
          npm run build
      - name: Verify demo credentials not in bundle
        working-directory: apps/web
        run: |
          npm run build
          ! grep -r "VITE_DEMO_PASSWORD" dist/ || (echo "Demo password found in bundle" && exit 1)
